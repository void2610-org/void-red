name: ReSharper Code Format

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  code-format:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Install ReSharper Command Line Tools
      run: |
        # ReSharper Command Line Tools をグローバルツールとしてインストール
        dotnet tool install -g JetBrains.ReSharper.GlobalTools
        
        # インストール確認とパス設定
        echo "🔍 インストールされたツールの確認:"
        dotnet tool list -g | grep -i resharper || echo "ReSharper not found in global tools"
        
        # PATHに ~/.dotnet/tools を追加
        echo "PATH=$HOME/.dotnet/tools:$PATH" >> $GITHUB_ENV
        
        # jb コマンドの存在確認
        which jb || echo "⚠️ jb command not found in PATH"
        ls -la $HOME/.dotnet/tools/jb* || echo "⚠️ jb executable not found in ~/.dotnet/tools"
        
    - name: Verify ReSharper installation
      run: |
        # PATH を再読み込みして ReSharper コマンドをテスト
        export PATH="$HOME/.dotnet/tools:$PATH"
        echo "🧪 ReSharper コマンドのテスト:"
        
        # jb コマンドの確認
        if command -v jb >/dev/null 2>&1; then
          echo "✅ jb command found"
          jb --help | head -5 || echo "jb --help failed"
        else
          echo "❌ jb command not found"
          echo "利用可能なコマンド:"
          ls -la $HOME/.dotnet/tools/ || echo "Tools directory not found"
          exit 1
        fi
        
        # inspectcode コマンドの確認  
        if jb inspectcode --help >/dev/null 2>&1; then
          echo "✅ jb inspectcode command working"
        else
          echo "❌ jb inspectcode command not working"
          exit 1
        fi
        
    - name: Verify Unity project files
      run: |
        echo "📁 プロジェクトファイルの確認:"
        echo "ソリューションファイル:"
        ls -la *.sln 2>/dev/null || echo "  ソリューションファイルが見つかりません"
        echo "プロジェクトファイル:"
        ls -la Assembly-CSharp*.csproj 2>/dev/null || echo "  Assembly-CSharp プロジェクトが見つかりません"
        
        # メインプロジェクトファイルの存在確認
        if [ -f "Assembly-CSharp.csproj" ]; then
          echo "✅ Unity メインプロジェクトファイルが見つかりました: Assembly-CSharp.csproj"
        else
          echo "❌ Assembly-CSharp.csproj が見つかりません。"
          exit 1
        fi
        
        # ReSharper解析用のクリーンなソリューションファイルを確認
        if [ -f "void-red-analysis.sln" ]; then
          echo "✅ ReSharper解析用ソリューションファイルが見つかりました: void-red-analysis.sln"
          echo "ファイル内容の確認:"
          head -3 void-red-analysis.sln
        else
          echo "❌ void-red-analysis.sln が見つかりません。"
          exit 1
        fi
        
    - name: Prepare for formatting
      run: |
        echo "🔧 ReSharper フォーマット準備中..."
        echo "💡 Unity プロジェクトのコードフォーマットを実行します"
      
    - name: Run ReSharper Code Cleanup (Format)
      run: |
        # PATH を確実に設定
        export PATH="$HOME/.dotnet/tools:$PATH"
        
        echo "🎨 ReSharper コードフォーマットを開始します..."
        echo "使用するソリューション: void-red-analysis.sln"
        
        # フォーマット前の状態を記録
        echo "📸 フォーマット前の状態を保存..."
        git add -A
        git diff --cached --name-only > format-target-files.txt
        git reset
        
        echo "📋 ReSharper フォーマットオプション:"
        echo "  - コードクリーンアップ（自動整形）"
        echo "  - 標準C#フォーマット設定"
        echo "  - メインゲームコードのみ対象（サンプル除外）"
        echo "  - Unity プロジェクト最適化"
        
        # ReSharper コードフォーマット設定ファイルを作成（現在のコードベーススタイル維持）
        echo "📝 ReSharper設定ファイルを作成中（現在のコードベーススタイル維持）..."
        echo '<wpf:ResourceDictionary xml:space="preserve" xmlns:x="http://schemas.microsoft.com/winfx/2006/xaml" xmlns:s="clr-namespace:System;assembly=mscorlib" xmlns:ss="urn:shemas-jetbrains-com:settings-storage-xaml" xmlns:wpf="http://schemas.microsoft.com/winfx/2006/xaml/presentation">' > .DotSettings
        echo '  <!-- 基本的なスペース設定のみ（既存スタイル保持） -->' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/SPACE_AFTER_COMMA/@EntryValue">True</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/SPACE_AROUND_BINARY_OPERATOR/@EntryValue">True</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/SPACE_BEFORE_COMMA/@EntryValue">False</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/SPACE_AROUND_EQUALITY_OPERATOR/@EntryValue">True</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/SPACE_AROUND_LOGICAL_OPERATOR/@EntryValue">True</s:Boolean>' >> .DotSettings
        echo '  <!-- 既存の改行・インデントスタイルを完全に維持 -->' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/KEEP_USER_LINEBREAKS/@EntryValue">True</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/SIMPLE_EMBEDDED_STATEMENT_STYLE/@EntryValue">DO_NOT_CHANGE</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/WRAP_LINES/@EntryValue">False</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/PLACE_SIMPLE_BLOCKS_ON_SINGLE_LINE/@EntryValue">False</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/KEEP_EXISTING_LINEBREAKS/@EntryValue">True</s:Boolean>' >> .DotSettings
        echo '  <!-- Using文やコメントの変更を無効化 -->' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/SORT_USINGS/@EntryValue">False</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/REMOVE_BLANK_LINES_NEAR_BRACES_IN_CODE/@EntryValue">False</s:Boolean>' >> .DotSettings
        echo '  <s:Boolean x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/REMOVE_BLANK_LINES_NEAR_BRACES_IN_DECLARATIONS/@EntryValue">False</s:Boolean>' >> .DotSettings
        echo '  <!-- 空行を完全に維持 -->' >> .DotSettings
        echo '  <s:Int64 x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/KEEP_BLANK_LINES_IN_CODE/@EntryValue">99</s:Int64>' >> .DotSettings
        echo '  <s:Int64 x:Key="/Default/CodeStyle/CodeFormatting/CSharpFormat/KEEP_BLANK_LINES_IN_DECLARATIONS/@EntryValue">99</s:Int64>' >> .DotSettings
        echo '</wpf:ResourceDictionary>' >> .DotSettings
        
        # ReSharper cleanupcode で利用可能なプロファイルを確認
        echo "🔍 利用可能なプロファイルを確認中..."
        jb cleanupcode --help | grep -A 20 -B 5 "profile" || true
        
        # デバッグ情報の表示
        echo ""
        echo "🔬 デバッグ情報:"
        echo "対象ファイル（ScoreCalculator.cs）の現在の状態:"
        head -30 Assets/Scripts/Game/Logic/ScoreCalculator.cs | cat -n
        
        # ReSharper cleanupcode の実行（Scripts以下の全ファイル、既存スタイル維持）
        echo ""
        echo "⚡ ReSharper cleanupcode を実行中（Scripts以下全ファイル、既存スタイル維持）..."
        jb cleanupcode void-red-analysis.sln \
          --verbosity=INFO \
          --include="Assets/Scripts/**/*.cs" \
          --exclude="**/Library/**;**/Temp/**;**/obj/**;**/bin/**;**/Packages/**;**/Samples/**" \
          --settings=.DotSettings \
          --profile="Built-in: Reformat Code" \
          --no-build \
          --properties:Configuration=Debug \
          2>&1 | head -100
        
        echo ""
        echo "🔄 フォーマット結果の詳細確認..."
        echo "現在のGit状態:"
        git status --porcelain || true
        
        echo ""
        echo "対象ファイル（ScoreCalculator.cs）のフォーマット後の状態:"
        head -30 Assets/Scripts/Game/Logic/ScoreCalculator.cs | cat -n
        
        echo ""
        echo "🔍 フォーマット差分の詳細確認:"
        git diff Assets/Scripts/Game/Logic/ScoreCalculator.cs | head -50 || echo "差分なし"
        
        echo ""
        echo "🧪 期待されるフォーマット結果（現在のコードベーススタイル維持）:"
        echo "  ✅ 修正される: カンマ後のスペース、演算子周りのスペース"
        echo "  ❌ 変更されない: using文の順序、改行スタイル、インデント、コメント"
        echo "  📁 対象: Assets/Scripts/**/*.cs のみ"
        echo "  🎯 目標: 基本的なスペース問題のみを修正し、既存スタイルを完全に維持"
          
        echo "✅ ReSharper コードフォーマットが完了しました"
          
    - name: Check format changes
      run: |
        echo "🔍 フォーマット結果の差分を確認中..."
        
        # Git 設定
        git config user.name "ReSharper Code Format Bot"
        git config user.email "noreply@github.com"
        
        # フォーマット後の変更を確認
        if git diff --quiet && git diff --cached --quiet; then
          echo "✅ フォーマット変更はありませんでした"
          echo "FORMAT_CHANGES=false" >> $GITHUB_ENV
        else
          echo "🎨 フォーマット変更が検出されました"
          echo "FORMAT_CHANGES=true" >> $GITHUB_ENV
          
          # 変更されたファイルの一覧を表示
          echo "📁 変更されたファイル:"
          git diff --name-only | head -20
          
          # 変更の概要を表示
          echo ""
          echo "📊 変更の統計:"
          git diff --stat | tail -1
          
          # 主要な変更内容をプレビュー
          echo ""
          echo "🔍 主要な変更内容 (最初の20行):"
          git diff --unified=1 | head -20 | sed 's/^/  /'
        fi
        
    - name: Format summary
      run: |
        echo "## 🎨 ReSharper コードフォーマット結果"
        echo ""
        
        if [ "$FORMAT_CHANGES" = "true" ]; then
          echo "### ✅ フォーマット完了"
          echo "- 💫 コードスタイルが統一されました"
          echo "- 📝 自動で整形・最適化されました"
          echo "- 🔧 ReSharper 標準プロファイルを適用"
          echo ""
          echo "### 📁 変更されたファイル:"
          git diff --name-only | sed 's/^/- /' | head -20
          echo ""
          echo "### 📊 変更統計:"
          git diff --stat | tail -1
        else
          echo "### ✅ フォーマット確認完了"
          echo "- コードスタイルは既に統一されています"
          echo "- 追加の変更は必要ありませんでした"
        fi
        
    - name: Check format compliance
      run: |
        echo "📋 コードフォーマット準拠チェック結果:"
        echo ""
        
        if [ "$FORMAT_CHANGES" = "true" ]; then
          echo "❌ コードフォーマットが準拠していません"
          echo ""
          echo "### 🔍 検出された問題:"
          echo "- コードスタイルが統一されていません"
          echo "- ReSharper 標準フォーマットとの差分があります"
          echo "- 手動でフォーマット適用が必要です"
          echo ""
          echo "### 📁 影響を受けるファイル:"
          git diff --name-only | sed 's/^/  - /' | head -20
          echo ""
          echo "### 🔧 修正方法:"
          echo "1. ReSharper を使用してコードをフォーマット"
          echo "2. IDE の自動フォーマット機能を使用"
          echo "3. 手動でコードスタイルを調整"
          echo ""
          echo "### 📊 変更統計:"
          git diff --stat | tail -1
          echo ""
          echo "❌ CI を失敗させます。コードをフォーマットしてから再度プッシュしてください。"
          exit 1
        else
          echo "✅ コードフォーマットが準拠しています"
          echo ""
          echo "### ✅ 確認完了:"
          echo "- コードスタイルが統一されています"
          echo "- ReSharper 標準フォーマットに準拠しています"
          echo "- 追加のフォーマット作業は不要です"
        fi