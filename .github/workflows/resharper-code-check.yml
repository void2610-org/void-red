name: ReSharper Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Check for Unity solution file
      run: |
        echo "Checking for Unity solution files..."
        ls -la *.sln *.csproj || echo "No solution files found"
        
        if [ -f "void-red.sln" ]; then
          echo "✅ Unity solution file found"
        else
          echo "❌ Unity solution file not found"
          echo "Please generate Unity solution files using the Export script:"
          echo "1. In Unity Editor, go to Window -> General -> Console"
          echo "2. Clear the console and run: Export.VSSolution()"
          echo "3. Commit the generated .sln and .csproj files to Git"
          echo "4. Re-run this workflow"
          exit 1
        fi
        
    - name: Install ReSharper Command Line Tools
      run: |
        cd $HOME
        dotnet tool install -g JetBrains.ReSharper.GlobalTools --version 2025.1.4
        echo "PATH=$PATH:$HOME/.dotnet/tools" >> $GITHUB_ENV
        
    - name: Run ReSharper Code Format Check
      run: |
        echo "Running ReSharper code format check..."
        # フォーマット関連の警告のみをチェック（命名規則と不要なusing文のみ）
        jb inspectcode void-red.sln \
          --output=inspectcode-results.xml \
          --format=xml \
          --severity=WARNING \
          --no-build \
          --settings=void-red.sln.DotSettings \
          --exclude="**/obj/**;**/bin/**;**/Library/**;**/Temp/**;**/Packages/**;**/PackageCache/**;**/Unity.**;**/Microsoft.**;**/System.**" \
          --verbosity=ERROR || echo "Inspectcode completed with warnings"
          
    - name: Check formatting results
      run: |
        if [ -f inspectcode-results.xml ]; then
          # XMLファイルの内容を表示してデバッグ
          echo "=== Inspection Results XML ==="
          head -20 inspectcode-results.xml
          echo "=== End of XML Preview ==="
          
          # 問題の総数をカウント
          TOTAL_ISSUES=$(grep -c '<Issue' inspectcode-results.xml || echo "0")
          echo "Found $TOTAL_ISSUES total issues"
          
          # 特定のフォーマット問題をカウント
          NAMING_ISSUES=$(grep -c "InconsistentNaming" inspectcode-results.xml || echo "0")
          USING_ISSUES=$(grep -c "RedundantUsingDirective" inspectcode-results.xml || echo "0")
          
          echo "Breakdown:"
          echo "- Naming convention violations: $NAMING_ISSUES"
          echo "- Redundant using directives: $USING_ISSUES"
          
          # 実際のフォーマット問題の数
          FORMAT_ISSUES=$((NAMING_ISSUES + USING_ISSUES))
          
          if [ "$FORMAT_ISSUES" -gt 0 ]; then
            echo "::warning::Found $FORMAT_ISSUES code format issues"
            echo ""
            echo "Run 'jb cleanupcode void-red.sln --include=\"InconsistentNaming;RedundantUsingDirective\"' locally to auto-fix these issues."
            
            # フォーマット問題があったらビルドを失敗させる
            echo "::error::Code formatting issues detected. Please fix them before merging."
            exit 1
          else
            echo "✅ Code format check passed - No formatting issues found"
          fi
        else
          echo "::error::Inspection results file not found"
          exit 1
        fi