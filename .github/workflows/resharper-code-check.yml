name: ReSharper Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Install ReSharper Command Line Tools
      run: |
        dotnet tool install -g JetBrains.ReSharper.GlobalTools
        
    - name: Find and inspect C# project files
      run: |
        # C#プロジェクトファイルを検索
        CSPROJ_FILES=$(find . -name "*.csproj" -not -path "./Library/*" -not -path "./Temp/*" | head -5)
        
        if [ -z "$CSPROJ_FILES" ]; then
          echo "No C# project files found"
          exit 1
        fi
        
        echo "Found C# project files:"
        echo "$CSPROJ_FILES"
        
        # 最初に見つかったプロジェクトファイルを使用
        MAIN_PROJECT=$(echo "$CSPROJ_FILES" | head -1)
        echo "Using project file: $MAIN_PROJECT"
        
        # .editorconfigファイルの確認
        if [ -f .editorconfig ]; then
          echo "✅ Found .editorconfig file for formatting rules"
        else
          echo "⚠️ No .editorconfig file found"
        fi
        
        # ReSharper Code Inspection実行 (.editorconfigは自動的に認識される)
        jb inspectcode "$MAIN_PROJECT" \
          --output=inspectcode-results.xml \
          --format=xml \
          --severity=WARNING \
          --exclude="**/*.Generated.cs;**/obj/**;**/bin/**;**/Library/**;**/Temp/**;**/Packages/**;**/PackageCache/**" \
          --verbosity=WARN
          
    - name: Check inspection results
      run: |
        if [ -f inspectcode-results.xml ]; then
          ISSUES=$(grep -c '<Issue' inspectcode-results.xml || echo "0")
          echo "Found $ISSUES code quality issues"
          
          if [ "$ISSUES" -gt 0 ]; then
            echo "::error::Code quality check failed: Found $ISSUES issues"
            exit 1
          fi
          
          echo "✅ Code quality check passed"
        else
          echo "::error::Inspection results file not found"
          exit 1
        fi