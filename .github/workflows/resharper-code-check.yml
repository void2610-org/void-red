name: ReSharper Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Install ReSharper Command Line Tools
      run: |
        dotnet tool install -g JetBrains.ReSharper.GlobalTools
        
    - name: Setup Unity project and inspect
      run: |
        # C#スクリプトファイルを検索
        CS_FILES=$(find Assets -name "*.cs" -not -path "*/Library/*" -not -path "*/Temp/*" | head -10)
        
        if [ -z "$CS_FILES" ]; then
          echo "No C# script files found in Assets folder"
          exit 1
        fi
        
        echo "Found C# script files:"
        echo "$CS_FILES"
        
        # .editorconfigファイルの確認
        if [ -f .editorconfig ]; then
          echo "✅ Found .editorconfig file for formatting rules"
        else
          echo "⚠️ No .editorconfig file found"
        fi
        
        # UnityプロジェクトのC#スクリプトを一つずつ検査
        echo "Running ReSharper inspection on Unity C# scripts..."
        
        # 一時的なプロジェクトファイルを作成
        cat > TempUnityProject.csproj << 'PROJEOF'
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <TargetFramework>net6.0</TargetFramework>
            <LangVersion>latest</LangVersion>
          </PropertyGroup>
          <ItemGroup>
            <Compile Include="Assets/**/*.cs" Exclude="Assets/**/Library/**;Assets/**/Temp/**;Assets/**/Packages/**;Assets/**/PackageCache/**" />
          </ItemGroup>
        </Project>
        PROJEOF
        
        # ReSharper Code Inspection実行
        jb inspectcode TempUnityProject.csproj \
          --output=inspectcode-results.xml \
          --format=xml \
          --severity=WARNING \
          --exclude="**/*.Generated.cs;**/obj/**;**/bin/**;**/Library/**;**/Temp/**;**/Packages/**;**/PackageCache/**" \
          --verbosity=WARN || echo "Some issues found, continuing..."
          
    - name: Check inspection results
      run: |
        if [ -f inspectcode-results.xml ]; then
          ISSUES=$(grep -c '<Issue' inspectcode-results.xml || echo "0")
          echo "Found $ISSUES code quality issues"
          
          if [ "$ISSUES" -gt 0 ]; then
            echo "::error::Code quality check failed: Found $ISSUES issues"
            exit 1
          fi
          
          echo "✅ Code quality check passed"
        else
          echo "::error::Inspection results file not found"
          exit 1
        fi