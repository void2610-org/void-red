name: ReSharper Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Install ReSharper Command Line Tools
      run: |
        dotnet tool install -g JetBrains.ReSharper.GlobalTools
        
    - name: Verify Unity solution file
      run: |
        # 既存のソリューションファイルが存在することを確認
        if [ -f "void-red.sln" ]; then
          echo "✅ Unity ソリューションファイルが見つかりました: void-red.sln"
          echo "ファイル内容の確認:"
          head -5 void-red.sln
        else
          echo "❌ void-red.sln が見つかりません"
          echo "利用可能なファイル:"
          ls -la *.sln 2>/dev/null || echo "ソリューションファイルが存在しません"
          exit 1
        fi
        
    - name: Restore NuGet packages
      run: dotnet restore void-red.sln
      
    - name: Run ReSharper Code Inspection
      run: |
        # Unity 専用の extensions を使用して静的解析を実行
        # 参考: https://zenn.dev/masakura/articles/60e502a275e9c3
        dotnet jb inspectcode void-red.sln \
          --output=resharper-report.xml \
          --format=Xml \
          --build \
          --extensions=JetBrains.Unity \
          --verbosity=WARN \
          --no-build-cache \
          --exclude="**/Library/**;**/Temp/**;**/obj/**;**/bin/**"
          
    - name: Upload inspection results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: resharper-inspection-results
        path: resharper-report.xml
        retention-days: 30
        
    - name: Generate inspection summary
      run: |
        # レポートのサマリーを生成
        echo "## 📊 ReSharper 静的解析結果サマリー"
        
        if [ -f "resharper-report.xml" ]; then
          ERROR_COUNT=$(grep -c 'Severity="ERROR"' resharper-report.xml || echo "0")
          WARNING_COUNT=$(grep -c 'Severity="WARNING"' resharper-report.xml || echo "0")
          SUGGESTION_COUNT=$(grep -c 'Severity="SUGGESTION"' resharper-report.xml || echo "0")
          
          echo "- ❌ エラー: $ERROR_COUNT 件"
          echo "- ⚠️  警告: $WARNING_COUNT 件"  
          echo "- 💡 提案: $SUGGESTION_COUNT 件"
          echo ""
          
          # 重大な問題の詳細を表示
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "### 🚨 エラー詳細 (最初の5件):"
            grep 'Severity="ERROR"' resharper-report.xml | head -5 | \
              sed 's/.*Message="\([^"]*\)".*/- \1/' || true
            echo ""
          fi
          
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "### ⚠️ 警告詳細 (最初の5件):"
            grep 'Severity="WARNING"' resharper-report.xml | head -5 | \
              sed 's/.*Message="\([^"]*\)".*/- \1/' || true
            echo ""
          fi
        else
          echo "❌ レポートファイルが見つかりません"
        fi
        
    - name: Check for inspection violations
      run: |
        # XMLレポートを解析して違反があるかチェック
        if [ ! -f "resharper-report.xml" ]; then
          echo "❌ ReSharper レポートファイルが見つかりません"
          exit 1
        fi
        
        ERROR_COUNT=$(grep -c 'Severity="ERROR"' resharper-report.xml || echo "0")
        WARNING_COUNT=$(grep -c 'Severity="WARNING"' resharper-report.xml || echo "0")
        
        if [ "$ERROR_COUNT" -gt 0 ]; then
          echo "❌ ReSharper found $ERROR_COUNT ERROR level violations"
          echo "Please check the uploaded artifact for details"
          exit 1
        elif [ "$WARNING_COUNT" -gt 0 ]; then
          echo "⚠️  ReSharper found $WARNING_COUNT WARNING level violations"
          echo "Please check the uploaded artifact for details"
          # 警告では CI を失敗させない（必要に応じて exit 1 を追加）
        else
          echo "✅ No ReSharper violations found"
        fi