name: ReSharper Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Install ReSharper Command Line Tools with Unity support
      run: |
        dotnet tool install -g JetBrains.ReSharper.GlobalTools
        
    - name: Create Unity project file for ReSharper
      run: |
        # .editorconfigファイルの確認
        if [ -f .editorconfig ]; then
          echo "✅ Found .editorconfig file for formatting rules"
        else
          echo "⚠️ No .editorconfig file found"
        fi
        
        # Unity向けの簡単なプロジェクトファイルを作成
        cat > Assembly-CSharp.csproj << 'PROJEOF'
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <TargetFramework>netstandard2.1</TargetFramework>
            <LangVersion>9.0</LangVersion>
            <Nullable>disable</Nullable>
            <DefineConstants>UNITY_2022_3_OR_NEWER;UNITY_2022_3;UNITY_2022;UNITY_5_3_OR_NEWER;UNITY_5_3;UNITY_5;UNITY_64;UNITY_EDITOR;UNITY_EDITOR_LINUX;UNITY_STANDALONE_LINUX;UNITY_STANDALONE;ENABLE_AUDIO;ENABLE_CACHING</DefineConstants>
          </PropertyGroup>
          <ItemGroup>
            <Compile Include="Assets/Scripts/**/*.cs" />
          </ItemGroup>
          <ItemGroup>
            <PackageReference Include="Unity.Collections" Version="1.2.4" />
            <PackageReference Include="Unity.Mathematics" Version="1.2.6" />
          </ItemGroup>
        </Project>
        PROJEOF
        
        # ReSharper Code Inspection実行
        jb inspectcode Assembly-CSharp.csproj \
          --output=inspectcode-results.xml \
          --format=xml \
          --severity=WARNING \
          --no-build \
          --exclude="**/*.Generated.cs;**/obj/**;**/bin/**;**/Library/**;**/Temp/**;**/Packages/**;**/PackageCache/**" \
          --verbosity=WARN || echo "Some issues found, continuing..."
          
    - name: Check inspection results
      run: |
        if [ -f inspectcode-results.xml ]; then
          ISSUES=$(grep -c '<Issue' inspectcode-results.xml || echo "0")
          echo "Found $ISSUES code quality issues"
          
          if [ "$ISSUES" -gt 0 ]; then
            echo "::error::Code quality check failed: Found $ISSUES issues"
            exit 1
          fi
          
          echo "✅ Code quality check passed"
        else
          echo "::error::Inspection results file not found"
          exit 1
        fi