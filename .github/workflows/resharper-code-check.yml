name: ReSharper Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Check for Unity solution file
      run: |
        echo "Checking for Unity solution files..."
        ls -la *.sln *.csproj || echo "No solution files found"
        
        if [ -f "void-red.sln" ]; then
          echo "✅ Unity solution file found"
        else
          echo "❌ Unity solution file not found"
          echo "Please generate Unity solution files using the Export script:"
          echo "1. In Unity Editor, go to Window -> General -> Console"
          echo "2. Clear the console and run: Export.VSSolution()"
          echo "3. Commit the generated .sln and .csproj files to Git"
          echo "4. Re-run this workflow"
          exit 1
        fi
        
    - name: Install ReSharper Command Line Tools
      run: |
        cd $HOME
        dotnet tool install -g JetBrains.ReSharper.GlobalTools --version 2025.1.4
        echo "PATH=$PATH:$HOME/.dotnet/tools" >> $GITHUB_ENV
        
    - name: Run ReSharper CleanupCode (Auto-fix)
      run: |
        echo "Running ReSharper cleanup to auto-fix formatting issues..."
        jb cleanupcode void-red.sln \
          --settings=void-red.sln.DotSettings \
          --exclude="**/obj/**;**/bin/**;**/Library/**;**/Temp/**;**/Packages/**;**/PackageCache/**;**/Unity.**;**/Microsoft.**;**/System.**" \
          --verbosity=ERROR || echo "Cleanup completed"
          
    - name: Check for code changes after cleanup
      run: |
        echo "Checking if code was modified by cleanup..."
        if git diff --exit-code; then
          echo "✅ No formatting issues found - Code is already properly formatted"
        else
          echo "::error::Code formatting issues detected and auto-fixed. Please review and commit the changes."
          echo ""
          echo "Changes made by ReSharper cleanup:"
          git diff --name-only
          echo ""
          echo "Run 'jb cleanupcode void-red.sln' locally to apply these fixes."
          exit 1
        fi