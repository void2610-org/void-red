name: ReSharper Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Check for Unity solution file
      run: |
        if [ -f "void-red.sln" ]; then
          echo "✅ Unity solution file found"
        else
          echo "❌ Unity solution file not found"
          echo "Available files:"
          ls -la *.sln || echo "No .sln files found"
          exit 1
        fi
        
    - name: Install ReSharper Command Line Tools
      run: |
        dotnet tool install -g JetBrains.ReSharper.GlobalTools --version 2025.1.4
        
    - name: Restore dependencies
      run: dotnet restore void-red.sln
      
    - name: Run ReSharper InspectCode
      run: |
        jb inspectcode void-red.sln \
          --output=inspectcode-results.xml \
          --format=xml \
          --severity=ERROR \
          --exclude="**/obj/**;**/bin/**;**/Library/**;**/Temp/**;**/Packages/**;**/PackageCache/**" \
          --verbosity=WARN
          
    - name: Check inspection results
      run: |
        if [ -f inspectcode-results.xml ]; then
          ISSUES=$(grep -c '<Issue' inspectcode-results.xml || echo "0")
          echo "Found $ISSUES error-level code quality issues"
          
          if [ "$ISSUES" -gt 0 ]; then
            echo "::error::Code quality check failed: Found $ISSUES error-level issues"
            exit 1
          fi
          
          echo "✅ Code quality check passed - No error-level issues found"
        else
          echo "::error::Inspection results file not found"
          exit 1
        fi