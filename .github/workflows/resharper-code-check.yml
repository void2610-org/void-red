name: ReSharper Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Check for Unity solution file
      run: |
        echo "Checking for Unity solution files..."
        ls -la *.sln *.csproj || echo "No solution files found"
        
        if [ -f "void-red.sln" ]; then
          echo "✅ Unity solution file found"
        else
          echo "❌ Unity solution file not found"
          echo "Please generate Unity solution files using the Export script:"
          echo "1. In Unity Editor, go to Window -> General -> Console"
          echo "2. Clear the console and run: Export.VSSolution()"
          echo "3. Commit the generated .sln and .csproj files to Git"
          echo "4. Re-run this workflow"
          exit 1
        fi
        
    - name: Install ReSharper Command Line Tools
      run: |
        cd $HOME
        dotnet tool install -g JetBrains.ReSharper.GlobalTools --version 2025.1.4
        echo "PATH=$PATH:$HOME/.dotnet/tools" >> $GITHUB_ENV
        
    - name: Run ReSharper InspectCode
      run: |
        echo "Running ReSharper inspection on main project only..."
        jb inspectcode Assembly-CSharp.csproj \
          --output=inspectcode-results.xml \
          --format=xml \
          --severity=ERROR \
          --no-build \
          --no-restore \
          --properties:Configuration=Release \
          --exclude="**/obj/**;**/bin/**;**/Library/**;**/Temp/**;**/Packages/**;**/PackageCache/**" \
          --verbosity=WARN
          
    - name: Check inspection results
      run: |
        if [ -f inspectcode-results.xml ]; then
          ISSUES=$(grep -c '<Issue' inspectcode-results.xml || echo "0")
          echo "Found $ISSUES error-level code quality issues"
          
          if [ "$ISSUES" -gt 0 ]; then
            echo "::warning::Found $ISSUES error-level issues - showing first 10:"
            echo ""
            
            # 最初の10個のエラーを表示
            grep -A 3 '<Issue' inspectcode-results.xml | head -40 || true
            
            # Unity参照エラーを除外してカウント
            REAL_ISSUES=$(grep '<Issue' inspectcode-results.xml | grep -v "UnityEngine" | grep -v "UnityEditor" | grep -v "Cannot resolve symbol" | wc -l || echo "0")
            echo ""
            echo "Non-Unity reference errors: $REAL_ISSUES"
            
            if [ "$REAL_ISSUES" -gt 0 ]; then
              echo "::error::Found $REAL_ISSUES real code quality issues"
              exit 1
            else
              echo "::warning::Only Unity reference errors found - passing"
            fi
          fi
          
          echo "✅ Code quality check passed"
        else
          echo "::error::Inspection results file not found"
          exit 1
        fi