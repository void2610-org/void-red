name: WebGL Build ✨

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write    # リポジトリの内容をプッシュする権限
  pages: write       # GitHub Pages ブランチへの書き込み権限

jobs:
  build:
    name: Build my project 🏗️
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space 🧹
        run: |
          # 必要なクリーンアップのみ実行して時間短縮
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean
          docker system prune --all --force
          df -h

      - name: Checkout repository 📥
        uses: actions/checkout@v4
        with:
          lfs: true
          # 高速化のため shallow clone を使用
          fetch-depth: 1

      - name: Optimize WebGL Build Settings 🔧
        run: |
          # WebGL最適化設定でビルド時間短縮
          sed -i 's/WebGLLinkerTarget: 0/WebGLLinkerTarget: 1/' ProjectSettings/ProjectSettings.asset
          sed -i 's/DecompressionFallback: 0/DecompressionFallback: 1/' ProjectSettings/ProjectSettings.asset
          # WebGL圧縮を無効化してビルド時間短縮（開発用）
          sed -i 's/webGLCompressionFormat: 1/webGLCompressionFormat: 0/' ProjectSettings/ProjectSettings.asset

      - name: Cache Unity Library 📦
        uses: actions/cache@v4
        with:
          path: |
            Library
            Temp/UnityLockfile
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}-${{ hashFiles('**/*.meta') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}-
            Library-${{ runner.os }}-

      - name: Force Git package resolution 📦
        run: |
          # Gitパッケージの強制解決
          echo "🔄 Forcing Git package resolution..."
          
          # Git設定
          echo "⚙️  Setting up Git configuration..."
          git config --global --add safe.directory '*'
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          
          # 現在のディレクトリ構造を確認
          echo "📁 Current directory structure:"
          ls -la
          echo "📁 Packages directory:"
          ls -la Packages/
          
          # packages-lock.jsonの状態を確認
          if [ -f "Packages/packages-lock.json" ]; then
            echo "📄 Found packages-lock.json, checking contents..."
            grep -A 5 -B 5 "serializereference-extensions" Packages/packages-lock.json || echo "❌ SerializeReferenceExtensions not found in lock file"
            rm Packages/packages-lock.json
            echo "🗑️  Removed packages-lock.json to force re-resolution"
          else
            echo "❌ No packages-lock.json found"
          fi
          
          # Libraryフォルダの状態を確認
          echo "📁 Library directory status:"
          ls -la Library/ || echo "❌ No Library directory found"
          
          # PackageCacheをクリア
          if [ -d "Library/PackageCache" ]; then
            echo "🧹 Clearing PackageCache..."
            rm -rf Library/PackageCache
            echo "✅ Cleared PackageCache"
          else
            echo "❌ No PackageCache found"
          fi
          
          # manifestファイルの内容を確認
          echo "📄 Current manifest.json contents:"
          cat Packages/manifest.json
          
          # Unity起動前に手動でGitパッケージを事前解決
          echo "🔧 Pre-resolving Git packages manually..."
          
          # SerializeReferenceExtensionsを手動でクローン
          mkdir -p Library/PackageCache
          cd Library/PackageCache
          
          echo "📦 Cloning SerializeReferenceExtensions..."
          git clone https://github.com/mackysoft/Unity-SerializeReferenceExtensions.git temp-sre
          
          echo "📁 Checking cloned repository structure..."
          ls -la temp-sre/
          ls -la temp-sre/Assets/ || echo "❌ No Assets directory"
          ls -la temp-sre/Assets/MackySoft/ || echo "❌ No MackySoft directory"
          
          if [ -d "temp-sre/Assets/MackySoft/MackySoft.SerializeReferenceExtensions" ]; then
            echo "✅ Found SerializeReferenceExtensions in cloned repo"
            mv temp-sre/Assets/MackySoft/MackySoft.SerializeReferenceExtensions com.mackysoft.serializereference-extensions
            rm -rf temp-sre
            echo "✅ Manually resolved SerializeReferenceExtensions"
            
            # 配置されたパッケージの内容を確認
            echo "📁 Manually resolved package contents:"
            ls -la com.mackysoft.serializereference-extensions/
            ls -la com.mackysoft.serializereference-extensions/Runtime/ || echo "❌ No Runtime directory"
            
          else
            echo "❌ SerializeReferenceExtensions not found in expected location"
            echo "🔍 Available directories in temp-sre:"
            find temp-sre -name "*SerializeReference*" -type d
            rm -rf temp-sre
          fi
          
          cd ../..
          
          # 最終的なPackageCacheの状態を確認
          echo "📁 Final PackageCache state:"
          ls -la Library/PackageCache/ || echo "❌ No PackageCache created"
          
          # manifestファイルを触ってUnityにパッケージ変更を通知
          touch Packages/manifest.json
          echo "✅ Touched manifest.json to notify Unity of changes"

      - name: Pre-build package verification 🔍
        run: |
          echo "🔍 Pre-build verification..."
          
          # Unity起動前の最終チェック
          echo "📁 Final directory structure before Unity build:"
          ls -la
          
          echo "📁 Packages directory contents:"
          ls -la Packages/
          
          echo "📁 Library/PackageCache contents:"
          ls -la Library/PackageCache/ || echo "❌ No PackageCache"
          
          # SerializeReferenceExtensionsパッケージの確認
          if [ -d "Library/PackageCache/com.mackysoft.serializereference-extensions" ]; then
            echo "✅ SerializeReferenceExtensions found in PackageCache"
            echo "📄 Package contents:"
            find Library/PackageCache/com.mackysoft.serializereference-extensions -name "*.cs" | head -10
          else
            echo "❌ SerializeReferenceExtensions NOT found in PackageCache"
          fi
          
          # manifest.jsonの最終確認
          echo "📄 Final manifest.json:"
          cat Packages/manifest.json
          
          # packages-lock.jsonの生成を確認
          if [ -f "Packages/packages-lock.json" ]; then
            echo "📄 packages-lock.json exists (generated by cache or other process)"
          else
            echo "❌ No packages-lock.json found - Unity will need to resolve packages"
          fi

      - name: Build project 🏗️
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion:   6000.0.37f1
          allowDirtyBuild: true
          buildsPath:     CIBuilds
          buildName:      build
          # より詳細なログを有効化
          customParameters: "-logFile - -verbose"
        continue-on-error: true

      - name: Post-build analysis 📊
        if: always()
        run: |
          echo "📊 Post-build analysis..."
          
          # ビルド後のPackageCacheの状態確認
          echo "📁 Post-build PackageCache state:"
          ls -la Library/PackageCache/ || echo "❌ No PackageCache found"
          
          # SerializeReferenceExtensionsの状態確認
          if [ -d "Library/PackageCache" ]; then
            echo "🔍 Searching for SerializeReferenceExtensions in PackageCache:"
            find Library/PackageCache -name "*serializereference*" -type d || echo "❌ No SerializeReferenceExtensions directories found"
            find Library/PackageCache -name "*mackysoft*" -type d || echo "❌ No MackySoft directories found"
            
            echo "🔍 All packages in PackageCache:"
            ls -la Library/PackageCache/ | grep -E "(mackysoft|serializereference)" || echo "❌ No matching packages found"
          fi
          
          # packages-lock.jsonの最終状態確認
          if [ -f "Packages/packages-lock.json" ]; then
            echo "📄 Final packages-lock.json contents (SerializeReferenceExtensions section):"
            grep -A 10 -B 2 "serializereference-extensions" Packages/packages-lock.json || echo "❌ SerializeReferenceExtensions not found in lock file"
          fi
          
          # ビルドエラーの詳細な分析
          echo "🔍 Analyzing build errors..."
          if [ -f "CIBuilds/WebGL/build/build.log" ]; then
            echo "📄 Build log analysis:"
            grep -n -A 5 -B 5 "MackySoft" CIBuilds/WebGL/build/build.log || echo "❌ No MackySoft references in build log"
            grep -n -A 5 -B 5 "SerializeReference" CIBuilds/WebGL/build/build.log || echo "❌ No SerializeReference references in build log"
          fi

      - name: Prepare artifact for deployment 🎯
        run: |
          # ブランチ名取得
          BRANCH=${GITHUB_REF_NAME#refs/heads/}
          # 出力先フォルダを決定
          if [ "$BRANCH" = "main" ]; then
            DEST_DIR="public"
            PUBLISH_DEST=""
          else
            DEST_DIR="public/$BRANCH"
            PUBLISH_DEST="$BRANCH"
          fi
          echo "Branch=$BRANCH -> DEST_DIR=$DEST_DIR PUBLISH_DEST=$PUBLISH_DEST"
          # 環境変数として後続ステップに渡す
          echo "PUBLISH_DEST=$PUBLISH_DEST" >> $GITHUB_ENV
          # root 権限でディレクトリ作成・移動
          sudo mkdir -p "$DEST_DIR"
          sudo mv CIBuilds/WebGL/build/* "$DEST_DIR/"
          # public 以下を現在のユーザー所有に変更
          sudo chown -R $USER:$USER public

      - name: Deploy to gh-pages branch 📤
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:    ${{ secrets.GITHUB_TOKEN }}
          publish_dir:     public
          publish_branch:  gh-pages
          destination_dir: ${{ env.PUBLISH_DEST }}
          keep_files: true

      # ↑ここまでで gh-pages ブランチへのデプロイは完了↑

      # ───────────────────────────────────────────────
      # ▼ ここから「プレビュー用アーティファクト」のアップロード ▼

      - name: Upload Pages artifact 🏷️
        id: upload_pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
          # name はデフォルトで "github-pages" になるので省略可
          # retention-days: 1   # 必要に応じて保持期間を設定

  preview:
    name: Deploy Preview 🌐
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: preview
      # PR 番号＋mergeフォルダ構造に合わせたプレビュー URL を返す
      url: https://void2610.github.io/void-red/${{ github.event.pull_request.number }}/merge/${{ github.event.pull_request.number }}/merge/
    
    steps:
      - name: Download Pages artifact 📥
        uses: actions/download-artifact@v4
        with:
          name: github-pages    # upload-pages-artifact のデフォルト名
          path: public

      - name: Deploy Preview to gh-pages 📤
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:    ${{ secrets.GITHUB_TOKEN }}
          publish_dir:     public/${{ github.event.pull_request.number }}/merge/${{ github.event.pull_request.number }}/merge
          publish_branch:  gh-pages
          destination_dir: ${{ github.event.pull_request.number }}/merge/${{ github.event.pull_request.number }}/merge
          keep_files:      true

  discord:
    name: Notify Discord 🤖
    runs-on: ubuntu-latest  # Discord通知は最小構成でOK
    needs: build
    # PRの場合は初回作成時のみ通知
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      - name: Notify Discord 🚨
        env:
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_ACTOR:         ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || github.actor }}
          COMMIT_MESSAGE:       ${{ github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message }}
          REF_DIR:              ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
          BRANCH:               ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: |
          if [ "$REF_DIR" = "main" ] || [ -z "$REF_DIR" ]; then
            URL="https://void2610.github.io/void-red/"
          else
            URL="https://void2610.github.io/void-red/$REF_DIR/merge/$REF_DIR/merge/"
          fi
          curl -X POST -H "Content-Type: application/json" -d "{
            \"content\": \"💬 タイトル: ${COMMIT_MESSAGE} \n🔥 ビルド結果: <${URL}> \n👤 作成者: ${GITHUB_ACTOR} \n🌲ブランチ: ${BRANCH}\"
          }" $DISCORD_WEBHOOK_URL
