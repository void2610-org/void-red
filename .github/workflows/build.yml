name: WebGL Build ✨

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write    # リポジトリの内容をプッシュする権限
  pages: write       # GitHub Pages ブランチへの書き込み権限
  id-token: write    # GitHub Pages環境への認証用

jobs:
  build:
    name: Build my project 🏗️
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space 🧹
        run: |
          # 必要なクリーンアップのみ実行して時間短縮
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean
          docker system prune --all --force
          df -h

      - name: Checkout repository 📥
        uses: actions/checkout@v4
        with:
          lfs: true
          # 高速化のため shallow clone を使用
          fetch-depth: 1

      - name: Generate GCP credentials file 🔐
        run: |
          # GitHubシークレットからJSONファイルを生成
          echo "${{ secrets.GCP_KEY }}" > Assets/StreamingAssets/${{ secrets.GCP_KEY_FILE_NAME }}.json
          
          # ファイルが正しく作成されたことを確認
          if [ -f "Assets/StreamingAssets/${{ secrets.GCP_KEY_FILE_NAME }}.json" ]; then
            echo "✅ GCP credentials file created successfully"
            echo "📄 File: ${{ secrets.GCP_KEY_FILE_NAME }}.json"
          else
            echo "❌ Failed to create GCP credentials file"
            exit 1
          fi

      - name: Optimize WebGL Build Settings 🔧
        run: |
          # WebGL最適化設定でビルド時間短縮
          sed -i 's/WebGLLinkerTarget: 0/WebGLLinkerTarget: 1/' ProjectSettings/ProjectSettings.asset
          sed -i 's/DecompressionFallback: 0/DecompressionFallback: 1/' ProjectSettings/ProjectSettings.asset
          # WebGL圧縮を無効化してビルド時間短縮（開発用）
          sed -i 's/webGLCompressionFormat: 1/webGLCompressionFormat: 0/' ProjectSettings/ProjectSettings.asset

      - name: Cache Unity Library 📦
        uses: actions/cache@v4
        with:
          path: |
            Library
            Temp/UnityLockfile
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}-${{ hashFiles('**/*.meta') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}-
            Library-${{ runner.os }}-

      - name: Verify Assets-based SerializeReferenceExtensions 📦
        run: |
          echo "🔍 Verifying Assets-based SerializeReferenceExtensions..."
          
          # Assets配置の確認
          echo "📁 Checking Assets/Plugins directory:"
          ls -la Assets/Plugins/ || echo "❌ No Plugins directory"
          
          if [ -d "Assets/Plugins/MackySoft.SerializeReferenceExtensions" ]; then
            echo "✅ SerializeReferenceExtensions found in Assets"
            echo "📁 Runtime directory:"
            ls -la Assets/Plugins/MackySoft.SerializeReferenceExtensions/Runtime/
            echo "📁 Editor directory:"
            ls -la Assets/Plugins/MackySoft.SerializeReferenceExtensions/Editor/
            
            # 重要なファイルの存在確認
            if [ -f "Assets/Plugins/MackySoft.SerializeReferenceExtensions/Runtime/SubclassSelectorAttribute.cs" ]; then
              echo "✅ SubclassSelectorAttribute.cs found"
            else
              echo "❌ SubclassSelectorAttribute.cs NOT found"
            fi
          else
            echo "❌ SerializeReferenceExtensions NOT found in Assets"
          fi
          
          # manifest.jsonの確認（Gitパッケージが削除されているか）
          echo "📄 Checking manifest.json (should not contain serializereference-extensions):"
          if grep -q "serializereference-extensions" Packages/manifest.json; then
            echo "❌ Git package reference still exists in manifest.json"
          else
            echo "✅ Git package reference removed from manifest.json"
          fi

      - name: Build project 🏗️
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          unityVersion:   6000.0.30f1
          allowDirtyBuild: true
          buildsPath:     CIBuilds
          buildName:      build

      - name: Prepare artifact 🎯
        run: |
          # ビルド結果をpublicディレクトリに移動
          mkdir -p public
          mv CIBuilds/WebGL/build/* public/

      - name: Upload Pages artifact 🏷️
        id: upload_pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
          # name はデフォルトで "github-pages" になるので省略可
          # retention-days: 1   # 必要に応じて保持期間を設定

  preview:
    name: Deploy to GitHub Pages 🌐
    # PRまたはmainブランチへのpushで実行
    if: github.event_name == 'pull_request' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
      # PRならプレビューURL、mainならルートURL
      url: ${{ github.event_name == 'pull_request' && format('https://void2610.github.io/void-red/{0}/merge/{0}/merge/', github.event.pull_request.number) || 'https://void2610.github.io/void-red/' }}
    
    steps:
      - name: Download Pages artifact 📥
        uses: actions/download-artifact@v4
        with:
          name: github-pages    # upload-pages-artifact のデフォルト名
          path: public

      - name: Deploy to gh-pages branch 📤
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:    ${{ secrets.GITHUB_TOKEN }}
          # PRならサブディレクトリ、mainならルート
          publish_dir:     ${{ github.event_name == 'pull_request' && format('public/{0}/merge/{0}/merge', github.event.pull_request.number) || 'public' }}
          publish_branch:  gh-pages
          destination_dir: ${{ github.event_name == 'pull_request' && format('{0}/merge/{0}/merge', github.event.pull_request.number) || '' }}
          keep_files:      true

  discord:
    name: Notify Discord 🤖
    runs-on: ubuntu-latest  # Discord通知は最小構成でOK
    needs: build
    # PRの場合は初回作成時のみ通知
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      - name: Notify Discord 🚨
        env:
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_ACTOR:         ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login || github.actor }}
          COMMIT_MESSAGE:       ${{ github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message }}
          REF_DIR:              ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}
          BRANCH:               ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: |
          if [ "$REF_DIR" = "main" ] || [ -z "$REF_DIR" ]; then
            URL="https://void2610.github.io/void-red/"
          else
            URL="https://void2610.github.io/void-red/$REF_DIR/merge/$REF_DIR/merge/"
          fi
          curl -X POST -H "Content-Type: application/json" -d "{
            \"content\": \"💬 タイトル: ${COMMIT_MESSAGE} \n🔥 ビルド結果: <${URL}> \n👤 作成者: ${GITHUB_ACTOR} \n🌲ブランチ: ${BRANCH}\"
          }" $DISCORD_WEBHOOK_URL
